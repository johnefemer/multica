name: Build & Push Kensink Images

# Builds custom backend + frontend images from the kensink branch
# and pushes them to GHCR. The agenthost server then pulls these
# instead of the upstream multica-ai images.
#
# Backend image: ghcr.io/johnefemer/multica-backend:kensink
# Frontend image: ghcr.io/johnefemer/multica-web:kensink

on:
  push:
    branches: [kensink]
    paths:
      - "server/**"
      - "apps/web/**"
      - "packages/**"
      - "Dockerfile"
      - "Dockerfile.web"
      - "docker-compose.selfhost*.yml"
      - ".github/workflows/build-kensink-images.yml"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  OWNER: johnefemer

jobs:
  build-backend:
    name: Build backend image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: kensink

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/multica-backend:kensink
            ${{ env.REGISTRY }}/${{ env.OWNER }}/multica-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-frontend:
    name: Build frontend image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: kensink

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.web
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/multica-web:kensink
            ${{ env.REGISTRY }}/${{ env.OWNER }}/multica-web:latest
          build-args: |
            REMOTE_API_URL=http://backend:8080
            NEXT_PUBLIC_WS_URL=wss://agenthost.kensink.com/ws
            NEXT_PUBLIC_APP_VERSION=kensink
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Pull new images on agenthost
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          ref: kensink

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.AGENTHOST_SSH_KEY }}" > ~/.ssh/agenthost.pem
          chmod 600 ~/.ssh/agenthost.pem
          ssh-keyscan -H "${{ secrets.AGENTHOST_IP }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Pull and restart on agenthost
        run: |
          ssh -i ~/.ssh/agenthost.pem ubuntu@${{ secrets.AGENTHOST_IP }} "
            cd /opt/multica

            # Ensure .env has our custom image pointers
            grep -q 'MULTICA_BACKEND_IMAGE' .env || \
              echo 'MULTICA_BACKEND_IMAGE=ghcr.io/johnefemer/multica-backend' >> .env
            grep -q 'MULTICA_WEB_IMAGE' .env || \
              echo 'MULTICA_WEB_IMAGE=ghcr.io/johnefemer/multica-web' >> .env
            grep -q 'MULTICA_IMAGE_TAG' .env || \
              echo 'MULTICA_IMAGE_TAG=kensink' >> .env

            # Pull and restart one service at a time to stay within disk limits
            docker compose -f docker-compose.selfhost.yml pull backend
            docker compose -f docker-compose.selfhost.yml up -d --no-deps backend

            docker compose -f docker-compose.selfhost.yml pull frontend
            docker compose -f docker-compose.selfhost.yml up -d --no-deps frontend

            # Prune old dangling images to reclaim disk
            docker image prune -f

            echo '=== Container status ==='
            docker compose -f docker-compose.selfhost.yml ps
          "

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/agenthost.pem
