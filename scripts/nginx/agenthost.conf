# ── Multica — agenthost.kensink.com ──────────────────────────────────────────
#
# Architecture:
#   port 80  → this nginx (Cloudflare proxies 80, terminates TLS)
#   /ws      → Go backend :8080  (WebSocket upgrade)
#   /api/*   → Go backend :8080  (REST)
#   /health  → Go backend :8080  (health check)
#   /*       → Next.js frontend :3000
#
# Deploy:
#   sudo cp scripts/nginx/agenthost.conf /etc/nginx/sites-available/multica
#   sudo ln -sf /etc/nginx/sites-available/multica /etc/nginx/sites-enabled/multica
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx
# ─────────────────────────────────────────────────────────────────────────────

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

upstream multica_frontend {
    server 127.0.0.1:3000;
    keepalive 32;
}

upstream multica_backend {
    server 127.0.0.1:8080;
    keepalive 32;
}

server {
    listen 80;
    server_name agenthost.kensink.com;

    # Cloudflare real IP passthrough
    real_ip_header    CF-Connecting-IP;

    # ── WebSocket (/ws) ───────────────────────────────────────────────────────
    location /ws {
        proxy_pass         http://multica_backend;
        proxy_http_version 1.1;

        # WebSocket upgrade headers
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection $connection_upgrade;

        # Standard proxy headers
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Keep WebSocket connections alive
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
        proxy_connect_timeout 10s;
    }

    # ── Backend API (/api/* and /health) ─────────────────────────────────────
    location /api/ {
        proxy_pass         http://multica_backend;
        proxy_http_version 1.1;
        proxy_set_header   Connection        '';
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;

        # Allow larger uploads
        client_max_body_size 50M;
    }

    location /health {
        proxy_pass         http://multica_backend;
        proxy_http_version 1.1;
        proxy_set_header   Connection        '';
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        access_log off;
    }

    # ── Frontend (everything else) ────────────────────────────────────────────
    location / {
        proxy_pass         http://multica_frontend;
        proxy_http_version 1.1;
        proxy_set_header   Connection        '';
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;

        # Next.js HMR WebSocket (no-op in production, harmless)
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection $connection_upgrade;
    }
}
